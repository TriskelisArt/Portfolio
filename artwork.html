<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artwork</title>

  <style>
    body {
      background-color: black;
      color: white;
      font-family: "Book Antiqua", serif;
      margin: 0;
      padding: 40px;
    }

    .home-link {
      margin-bottom: 40px;
    }

    .home-link a {
      color: #00aaff;
      text-decoration: none;
      font-size: 20px;
      text-shadow: 0 0 8px rgba(0, 170, 255, 0.6);
      transition: all 0.3s ease;
    }

    .home-link a:hover {
      text-shadow: 0 0 18px rgba(0, 170, 255, 1),
                   0 0 30px rgba(0, 170, 255, 0.8);
    }

    .page-title {
      font-size: 48px;
      margin-bottom: 70px;
      color: #00aaff;
      text-shadow: 0 0 10px rgba(0, 170, 255, 0.45);
    }

    section {
      margin-bottom: 110px;
    }

    .section-title {
      font-size: 36px;
      margin-bottom: 12px;
      color: #00aaff;
      text-shadow: 0 0 8px rgba(0, 170, 255, 0.35);
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, rgba(0, 170, 255, 0.85), rgba(0, 170, 255, 0.15));
      box-shadow: 0 0 10px rgba(0, 170, 255, 0.35);
      margin-bottom: 30px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
    }

    .gallery-grid a {
      display: block;
      text-decoration: none;
      transition: transform 0.25s ease;
    }

    .gallery-grid a:hover {
      transform: translateY(-4px);
    }

    .gallery-grid img {
      width: 100%;
      height: auto;
      display: block;
      border: 1px solid rgba(0, 170, 255, 0.35);
      box-shadow: 0 0 14px rgba(0, 170, 255, 0.18);
      transition: box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .gallery-grid a:hover img {
      border-color: rgba(0, 170, 255, 0.75);
      box-shadow: 0 0 22px rgba(0, 170, 255, 0.35);
    }

    @media (max-width: 768px) {
      body {
        padding: 24px;
      }

      .page-title {
        font-size: 38px;
        margin-bottom: 50px;
      }

      .section-title {
        font-size: 28px;
      }

      .gallery-grid {
        grid-template-columns: 1fr;
        gap: 22px;
      }
    }
  </style>
</head>

<body>

    </div>

      <a href="resources/print4.jpg"><img src="resources/print4.jpg" alt="Print 4"></a>
