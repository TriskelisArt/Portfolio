<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Triskelis Art</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: "Book Antiqua", serif;
    }

    .page-wrapper {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      background: black;
    }

    .hero-image {
      width: 100%;
      height: auto;
      display: block;
    }

    .nav-links {
      position: absolute;
      bottom: 40%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 60px;
      z-index: 2;
      flex-wrap: nowrap;
    }

    .nav-links a {
      color: #00aaff;
      text-decoration: none;
      font-size: 72px;
      line-height: 1;
      white-space: nowrap;
      text-shadow: 0 0 8px rgba(0, 170, 255, 0.6);
      transition: all 0.3s ease;
    }

    .nav-links a:hover {
      text-shadow: 0 0 18px rgba(0, 170, 255, 1),
                   0 0 30px rgba(0, 170, 255, 0.8);
    }

    /* CONTACT LINK (separate row below) */
    .contact-link {
      position: absolute;
      bottom: 28%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
    }

    .contact-link a {
      color: #00aaff;
      text-decoration: none;
      font-size: 20pt;
      text-shadow: 0 0 8px rgba(0, 170, 255, 0.6);
      transition: all 0.3s ease;
    }

    .contact-link a:hover {
      text-shadow: 0 0 18px rgba(0, 170, 255, 1),
                   0 0 30px rgba(0, 170, 255, 0.8);
    }

    @media (max-width: 1100px) {
      .nav-links a {
        font-size: 54px;
      }

      .nav-links {
        gap: 35px;
        bottom: 30px;
      }

      .contact-link {
        bottom: 80px;
      }
    }

    @media (max-width: 768px) {
      .nav-links {
        flex-direction: column;
        align-items: center;
        gap: 18px;
        bottom: 20px;
      }

      .nav-links a {
        font-size: 36px;
      }

      .contact-link {
        bottom: 140px;
      }

      .contact-link a {
        font-size: 18pt;
      }
    }
  </style>
</head>

<body>
  <div class="page-wrapper">
    <img src="resources/FullPageMock3.jpg" alt="Triskelis Art homepage" class="hero-image">

    <div class="nav-links">
      <a href="artwork.html">ARTWORK</a>
      <a href="information.html">INFORMATION</a>
      <a href="patronage.html">PATRONAGE</a>
    </div>

    <!-- CONTACT LINK -->
    <div class="contact-link">
      <a id="contact-email" href="#">CONTACT</a>
    </div>

  </div>

  <!-- Email Obfuscation Script -->
  <script>
    const user = "jmiberg";
    const domain = "fortlewis.edu";
    const emailLink = document.getElementById("contact-email");

    emailLink.href = "mailto:" + user + "@" + domain;
  </script>
</body>
</html>
